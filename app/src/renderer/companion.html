<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>BlackFossil Companion</title>
  <link rel="stylesheet" href="styles/app.css" />
  <link rel="stylesheet" href="styles/companion.css" />
</head>
<body class="companion">
  <div id="cpGate">
    <img src="assets/logo.png" alt="" width="96" height="96" />
    <h1>BlackFossil Companion</h1>
    <p id="cpGateMsg">Lade…</p>
    <button id="cpGateBtn" class="cp-btn cp-btn-primary" hidden>Mit Discord anmelden</button>
  </div>

  <div id="cpApp" hidden>
    <nav id="cpNav">
      <div class="cp-brand"><img src="assets/logo.png" alt="" width="28" height="28" /><span>Companion</span></div>
      <!-- Gruppen und Punkte kommen aus companion/nav.js — nur was der Rang
           hergibt, wird ueberhaupt erzeugt. -->
      <div id="cpNavList"></div>
      <div class="cp-nav-spacer"></div>
      <div id="cpNavSettings"></div>
      <div class="cp-who"><div class="cp-who-name" id="cpWhoName">—</div><div id="cpWhoRank" class="cp-muted"></div></div>
    </nav>

    <main id="cpMain">
      <section class="cp-view" data-view="map">
        <div class="cp-bar">
          <span id="cpMapStat" class="cp-muted"></span>
          <div class="cp-bar-right">
            <span class="cp-muted">Tags ab Zoom</span>
            <input type="range" id="cpLabelZoom" min="1" max="15" step="0.1" value="1.6" />
            <span id="cpLabelZoomVal" class="cp-muted">1.6×</span>
            <button id="cpEditMode" class="cp-switch" role="switch" aria-checked="false" hidden>
              <span class="cp-switch-track"><span class="cp-switch-thumb"></span></span>
              <span>Bearbeiten</span>
            </button>
            <button id="cpCreateBtn" class="cp-btn cp-btn-sm" hidden>Erstellen</button>
            <button id="cpPlayersBtn" class="cp-btn cp-btn-sm" aria-pressed="false" hidden>Spieler</button>
            <button id="cpMapReset" class="cp-btn cp-btn-sm">Ansicht zurücksetzen</button>
          </div>
        </div>
        <div id="cpMapWrap">
          <canvas id="cpMapCanvas"></canvas>
          <div id="cpLegend"></div>
          <div id="cpMapTip" hidden></div>
          <div id="cpMarquee" hidden></div>
          <button id="cpRaidAtlas" title="Kartengrundlage von RaidAtlas — Website öffnen">
            <img src="assets/raidatlas-logo.png" alt="RaidAtlas Interactive Maps" draggable="false">
          </button>
        </div>
      </section>

      <!-- Alle uebrigen Ansichten teilen sich EINEN Container: sie bringen ihr
           Markup selbst mit, also braucht es keine leeren Huellen je Punkt.
           Nur die Karte hat eigenes statisches Markup (oben). -->
      <section class="cp-view" id="cpPanelView" hidden></section>
    </main>
  </div>

  <div id="cpToasts"></div>
  <script src="dist/companion.js"></script>
</body>
</html>
