<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BlackFossil Overlay</title>
  <style>
    :root { --bg:#0f0a1e; --card:#1a1330; --border:#3a2d5c; --accent:#8b5cf6; --text:#eee; --muted:#b3a9cc; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 10px 16px; font-size: 14px; cursor: pointer; font-weight: 600; }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    button:disabled { opacity: 0.5; cursor: default; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .status { font-size: 13px; color: var(--muted); }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #666; margin-right: 6px; }
    .dot.on { background: #22c55e; } .dot.warn { background: #f59e0b; } .dot.off { background: #ef4444; }
    .participant { padding: 6px 10px; background: rgba(255,255,255,0.04); border-radius: 6px; margin-top: 6px; font-size: 13px; display:flex; justify-content:space-between; }
    .hidden { display: none; }
    input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: #120d24; color: var(--text); font-size: 12px; margin-top: 6px; }
    .speaking { color: #22c55e; }
  </style>
</head>
<body>
  <h1>🦖 BlackFossil Overlay</h1>
  <div class="sub">Proximity Chat · Map · Minimap</div>

  <!-- Login -->
  <div id="loginCard" class="card">
    <div class="status"><span class="dot off"></span>Nicht angemeldet</div>
    <p class="sub">Melde dich mit Discord an, um dem Voice-Chat beizutreten.</p>
    <button id="loginBtn">Mit Discord anmelden</button>
    <details style="margin-top:14px">
      <summary class="sub" style="cursor:pointer">Manuell anmelden (Fallback)</summary>
      <input id="manualSession" placeholder="Session-Token einfügen…" />
      <button class="secondary" id="manualBtn" style="margin-top:6px">Übernehmen</button>
    </details>
  </div>

  <!-- Verbunden -->
  <div id="connectedCard" class="card hidden">
    <div class="status"><span id="voiceDot" class="dot off"></span><span id="voiceStatus">Verbinde…</span></div>
    <div class="row" style="margin-top:12px">
      <button id="micBtn">🎙️ Mikro an</button>
      <button class="secondary" id="logoutBtn">Abmelden</button>
    </div>
    <div style="margin-top:14px">
      <div class="sub">Im Voice-Raum:</div>
      <div id="participants"></div>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>
</html>
