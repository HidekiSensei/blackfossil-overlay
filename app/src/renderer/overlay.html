<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>BlackFossil Overlay</title>
  <style>
    :root { --accent:#8b5cf6; --on:#22c55e; --off:#ef4444; --warn:#f59e0b; --panel:rgba(20,13,38,0.92); --border:#3a2d5c; --muted:#b3a9cc; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: system-ui, sans-serif; color: #eee; user-select: none; }

    /* Minimap oben rechts */
    #minimapWrap { position: absolute; top: 20px; right: 20px; }
    #minimap { width: 200px; height: 200px; border-radius: 50%; border: 2px solid var(--border); background: rgba(15,10,30,0.55); }
    #micIndicator { margin-top: 10px; display: flex; align-items: center; gap: 9px; justify-content: center;
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 13px; }
    #micIcon { display: inline-flex; width: 20px; height: 20px; transition: color 0.15s; }
    #micIcon svg { width: 20px; height: 20px; }
    .mic-idle { color: #eee; } .mic-connecting { color: var(--warn); }
    .mic-speaking { color: var(--on); } .mic-muted { color: var(--off); } .mic-disconnected { color: var(--off); }
    #zoneBox { margin-top: 8px; text-align: center; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 10px; font-size: 12px; color: var(--muted); }

    /* Große Map */
    #bigMap { position: absolute; inset: 0; background: rgba(8,5,18,0.82); display: none; align-items: center; justify-content: center; flex-direction: column; }
    #bigMapCanvas { max-width: 88vh; max-height: 88vh; width: 88vh; height: 88vh; border-radius: 12px; border: 1px solid var(--border); background: rgba(15,10,30,0.6); }
    .hint { margin-top: 12px; color: var(--muted); font-size: 13px; }

    /* Settings-Panel */
    #settings { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); display: none;
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 380px; }
    #settings h2 { font-size: 16px; margin-bottom: 14px; }
    .kv { display: flex; justify-content: space-between; padding: 7px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .kv kbd { background: #120d24; border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-size: 12px; }
    .btnrow { display: flex; gap: 8px; margin-top: 16px; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  </style>
</head>
<body>
  <!-- Minimap + Mikro -->
  <div id="minimapWrap">
    <canvas id="minimap" width="200" height="200"></canvas>
    <div id="micIndicator"><span id="micIcon" class="mic-connecting"></span><span id="micText">Verbinde…</span></div>
    <div id="zoneBox">Zone: —</div>
  </div>

  <!-- Große Map -->
  <div id="bigMap">
    <div style="position:relative">
      <canvas id="bigMapCanvas" width="1000" height="1000"></canvas>
      <button id="heatBtn" style="position:absolute;top:12px;right:12px;width:auto;padding:8px 14px;
        background:var(--panel);border:1px solid var(--border);color:#eee;border-radius:8px;
        font-size:13px;font-weight:600;cursor:pointer">🔥 Heatmap</button>
      <button id="calibBtn" style="display:none;position:absolute;top:12px;left:12px;width:auto;padding:8px 14px;
        background:var(--panel);border:1px solid var(--border);color:#eee;border-radius:8px;
        font-size:13px;font-weight:600;cursor:pointer">🔧 Kalibrieren</button>

      <!-- Kalibrierungs-Panel -->
      <div id="calibPanel" style="display:none;position:absolute;top:56px;left:12px;width:280px;
        background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px">
        <div style="font-weight:700;margin-bottom:6px">🔧 Kalibrierung</div>
        <div style="color:var(--muted);margin-bottom:10px;line-height:1.4">
          Wähle einen bekannten Punkt, dann klicke auf der Karte wo er ist. Mindestens 3 Punkte.</div>
        <div id="calibRefs" style="max-height:220px;overflow:auto;display:flex;flex-direction:column;gap:4px"></div>
        <div id="calibCount" style="margin-top:8px;color:var(--muted)">0 Punkte gesetzt</div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button id="calibSolve" style="flex:1;padding:8px;font-size:12px;border-radius:6px;border:0;background:var(--accent);color:#fff;cursor:pointer">Berechnen</button>
          <button id="calibReset" style="flex:1;padding:8px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">Reset</button>
        </div>
      </div>
    </div>
    <div class="hint">F7 schließen · Klick = Wegpunkt · 🔧 = Karte kalibrieren</div>
  </div>

  <!-- Settings -->
  <div id="settings">
    <h2>⚙️ Voice & Overlay</h2>
    <div class="kv"><span>Verbinden / Trennen</span><kbd id="hk-connect">F8</kbd></div>
    <div class="kv"><span>Mikro an/aus</span><kbd id="hk-mic">F9</kbd></div>
    <div class="kv"><span>Einstellungen</span><kbd id="hk-settings">F10</kbd></div>
    <div class="kv"><span>Große Map</span><kbd id="hk-map">F7</kbd></div>
    <div class="btnrow">
      <button id="connBtn">Verbinden</button>
      <button id="micBtn" class="secondary">Mikro an</button>
    </div>
    <div class="btnrow">
      <button id="logoutBtn" class="secondary">Abmelden</button>
      <button id="closeBtn" class="secondary">Schließen (F10)</button>
    </div>
  </div>

  <script src="dist/overlay.js"></script>
</body>
</html>
