# Zweites Build-Target aus derselben package.json.
# extraMetadata.main schreibt den Entry-Point im gepackten Paket um — das ist der
# Kniff, mit dem zwei Apps aus einem Projekt fallen.
appId: de.blackfossil.companion.test
productName: BlackFossil Companion Test
artifactName: BlackFossil-Companion-Test-Setup.${ext}
npmRebuild: false

directories:
  output: release-companion

extraMetadata:
  main: src/companion-main.js

files:
  - src/companion-main.js
  - src/companion-preload.js
  - src/renderer/companion.html
  - src/renderer/styles/**
  - src/renderer/dist/companion.js
  - src/renderer/assets/**
  - package.json
  # node_modules KOMPLETT raus: companion-main.js/-preload.js brauchen nur
  # Electron-Builtins (electron, path, fs, http), und der Renderer ist von esbuild
  # zu dist/companion.js gebuendelt. Einzelne Pakete auszuschliessen reichte nicht —
  # livekit-client zieht @bufbuild/protobuf, @livekit/*, jose, webrtc-adapter u. a.
  # transitiv nach, die dann als Leichen im Paket landeten.
  # ACHTUNG: electron-updater MUSS mit ins Paket — ohne das laeuft kein
  # Auto-Update. Alles andere bleibt draussen; der Renderer ist gebuendelt.
  - '!node_modules/**'
  - 'node_modules/electron-updater/**'
  - 'node_modules/builder-util-runtime/**'
  - 'node_modules/js-yaml/**'
  - 'node_modules/lazy-val/**'
  - 'node_modules/lodash.escaperegexp/**'
  - 'node_modules/lodash.isequal/**'
  - 'node_modules/semver/**'
  - 'node_modules/argparse/**'
  - 'node_modules/fs-extra/**'
  - 'node_modules/graceful-fs/**'
  - 'node_modules/jsonfile/**'
  - 'node_modules/universalify/**'
  - 'node_modules/sax/**'
  - 'node_modules/debug/**'
  - 'node_modules/ms/**'

protocols:
  - name: BlackFossil Companion
    schemes:
      - blackfossil-companion-test

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false

linux:
  # executableName MUSS gesetzt werden: electron-builder leitet ihn sonst aus
  # package.json.name ab (= "blackfossil-overlay") — Companion und Overlay haetten
  # dann dieselbe Binary und denselben .desktop-Eintrag. Das Test-Suffix haelt
  # zusaetzlich Companion-Test und Companion-Prod auseinander (patch-prod dreht es).
  executableName: blackfossil-companion-test
  target:
    - target: AppImage
      arch: [x64]
  category: Utility

publish:
  - provider: github
    owner: HidekiSensei
    repo: blackfossil-overlay
    # KRITISCH: Beide Apps publishen ins selbe Repo. electron-updater loest Updates
    # ueber latest.yml auf — ohne eigenen Channel ueberschreiben sich Overlay und
    # Companion gegenseitig und das Overlay wuerde Companion-Builds als eigenes
    # Update anbieten. channel erzeugt companion.yml / companion-linux.yml.
    channel: companion
# Hinweis: Der tatsaechlich genutzte Feed ist NICHT GitHub, sondern das eigene
# Backend (/overlay, Kanal "companion"). setFeedURL in companion-main.js
# ueberschreibt diesen Eintrag zur Laufzeit. Der publish-Block bleibt, weil
# electron-builder daraus companion.yml erzeugt — genau die Datei, die die CI
# dann ins Backend laedt.
