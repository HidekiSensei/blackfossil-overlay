# GitLab CI — blackfossil-overlay (Windows-Runner)
# dev  -> Test-Installer bauen (electron-builder, KEIN publish) -> Artefakt (1 Datei)
# main/Tag -> Prod-Release (folgt: braucht generic-Updater-Feed-Entscheidung)
stages:
  - build

build:test-installer:
  stage: build
  tags: [windows]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - cd app
    - node -v
    - npm ci
    - npm run build:renderer
    - npx electron-builder --win --publish never
    - |
      $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
      $exe = Get-ChildItem release -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
      if (-not $exe) { $exe = Get-ChildItem release -Filter "*.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike "*uninstaller*" -and $_.Name -notlike "*test*" } | Select-Object -First 1 }
      Remove-Item "release\BlackFossil-Overlay-test-*.exe" -ErrorAction SilentlyContinue
      Copy-Item $exe.FullName "release\BlackFossil-Overlay-test-$v.exe" -Force
      Write-Host "TEST-INSTALLER: BlackFossil-Overlay-test-$v.exe ($([math]::Round((Get-Item "release\BlackFossil-Overlay-test-$v.exe").Length/1MB,1)) MB)"
  artifacts:
    name: blackfossil-overlay-test-installer
    paths:
      - app/release/BlackFossil-Overlay-test-*.exe
    expire_in: 14 days
