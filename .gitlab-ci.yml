# GitLab CI — blackfossil-overlay
# dev  -> Test-Installer (electron, no publish) -> Artefakt
# main -> Prod-Installer bauen (manueller Button) -> auf Caddy-Feed publizieren
#         Feed: https://api.blackfossil.de/overlay/  (electron-updater generic)
stages:
  - build
  - publish

build:test-installer:
  stage: build
  # windows UND msvc: nur der windows-test-box-Runner hat beide Tags. Ohne "msvc" greift auch der
  # SanServer-Runner (nur "windows"), auf dem aber kein pwsh installiert ist → "prepare environment"-
  # Systemfehler. Der msvc-Tag routet den Job gezielt auf die richtige Build-Box.
  tags: [windows, msvc]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - cd app
    - node -v
    - npm ci
    - npm run build:renderer
    - npx electron-builder --win --publish never
    - |
      $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
      $exe = Get-ChildItem release -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
      Remove-Item "release\BlackFossil-Overlay-test-*.exe" -ErrorAction SilentlyContinue
      Copy-Item $exe.FullName "release\BlackFossil-Overlay-test-$v.exe" -Force
      Write-Host "TEST-INSTALLER: BlackFossil-Overlay-test-$v.exe"
  artifacts:
    name: blackfossil-overlay-test-installer
    paths: [app/release/BlackFossil-Overlay-test-*.exe]
    expire_in: 14 days

build:prod:
  stage: build
  # windows UND msvc: nur der windows-test-box-Runner hat beide Tags. Ohne "msvc" greift auch der
  # SanServer-Runner (nur "windows"), auf dem aber kein pwsh installiert ist → "prepare environment"-
  # Systemfehler. Der msvc-Tag routet den Job gezielt auf die richtige Build-Box.
  tags: [windows, msvc]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - cd app
    - node -v
    - npm ci
    - npm run build:renderer
    - npx electron-builder --win --publish never
    - |
      Write-Host "=== release/ Inhalt ==="; Get-ChildItem release | ForEach-Object { Write-Host "  $($_.Name)  $([math]::Round($_.Length/1MB,2))MB" }
      if (-not (Test-Path release/latest.yml)) { throw "latest.yml wurde NICHT erzeugt" }
      Write-Host "=== latest.yml ==="; Get-Content release/latest.yml
  artifacts:
    name: blackfossil-overlay-prod
    paths:
      - app/release/*.exe
      - app/release/latest.yml
      - app/release/*.blockmap
    expire_in: 7 days

publish:feed:
  stage: publish
  tags: [linux, deploy]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs: ["build:prod"]
  environment:
    name: overlay-feed
    url: https://api.blackfossil.de/overlay/
  script:
    - test -f app/release/latest.yml
    - install -d -m 755 /var/www/overlay
    - find app/release -name '*.exe' ! -name '*uninstaller*' -exec cp -f {} /var/www/overlay/ \;
    - cp -f app/release/latest.yml /var/www/overlay/
    - find app/release -name '*.blockmap' -exec cp -f {} /var/www/overlay/ \;
    - chmod 644 /var/www/overlay/*
    - ls -la /var/www/overlay/
    - echo "Feed aktualisiert -> https://api.blackfossil.de/overlay/latest.yml"
