# Test-Build der Companion-App bei jedem Push/Merge auf dev.
# Analog zu dev-build.yml (Overlay), nur mit der zweiten electron-builder-Config.
#
# Kein Publish, kein Auto-Update — nur ein Installer als Artifact zum Testen.
# Der Code hat Test-Defaults (api-test.blackfossil.de, appId
# "de.blackfossil.companion.test", productName "BlackFossil Companion Test");
# main dreht das im companion-release.yml via app/scripts/patch-prod.js.
#
# Die abweichende appId/productName ist Absicht: Companion-Test, Companion-Prod,
# Overlay-Test und Overlay-Prod sind vier getrennte Installationen mit eigenem
# Installpfad, eigenem userData-Verzeichnis und eigener Session — alle vier lassen
# sich parallel installieren.
name: Build Companion Test-Installer (dev)

on:
  push:
    branches: [dev]
    paths:
      - 'app/src/companion-main.js'
      - 'app/src/companion-preload.js'
      - 'app/src/renderer/companion.js'
      - 'app/src/renderer/companion.html'
      - 'app/src/renderer/companion/**'
      - 'app/src/renderer/shared/**'
      - 'app/src/renderer/styles/**'
      - 'app/src/renderer/map.js'
      - 'app/electron-builder.companion.yml'
      - 'app/package.json'
      - '.github/workflows/companion-dev-build.yml'
  workflow_dispatch:

concurrency:
  group: companion-dev-build
  cancel-in-progress: true

jobs:
  build-test-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build:renderer
      - run: npm run test:shared

      - name: Dev-Version setzen
        shell: bash
        run: |
          BASE=$(node -p "require('./package.json').version")
          DEV="${BASE}-dev.${{ github.run_number }}"
          node -e "const f='./package.json',p=require(f);p.version='${DEV}';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          echo "Dev-Version: $DEV"

      - name: Installer bauen (KEIN GitHub-Publish)
        run: npx electron-builder --win --config electron-builder.companion.yml --publish never

      # VOR dem Umbenennen hochladen — companion.yml referenziert den
      # Original-Dateinamen. Feed + Installer landen im selben Backend-Verzeichnis
      # wie das Overlay; getrennt gehalten werden sie ueber den Kanal
      # (companion.yml statt latest.yml) und den Dateinamen.
      # Die Release-Notes (releases.json) laedt der Overlay-Build hoch — beide
      # Apps teilen sich Version und Notizen.
      - name: Test-Artefakte aufs Backend laden (api-test)
        shell: bash
        run: |
          for f in release-companion/companion.yml release-companion/*.exe release-companion/*.exe.blockmap; do
            [ -e "$f" ] || continue
            echo "Upload $(basename "$f")"
            curl -fsS -H "Authorization: Bearer $BF_OVERLAY_UPLOAD_TOKEN" -F "file=@$f" "$API/overlay/upload"
          done
        env:
          API: https://api-test.blackfossil.de
          BF_OVERLAY_UPLOAD_TOKEN: ${{ secrets.BF_OVERLAY_UPLOAD_TOKEN_TEST }}

      - name: Versionierter Dateiname
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          mv "release-companion/BlackFossil-Companion-Test-Setup.exe" "release-companion/BlackFossil-Companion-TEST-${V}-${GITHUB_SHA::7}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: companion-test-installer-win
          path: app/release-companion/*.exe
          if-no-files-found: error
          retention-days: 14

  build-test-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build:renderer

      - name: Dev-Version setzen
        run: |
          BASE=$(node -p "require('./package.json').version")
          DEV="${BASE}-dev.${{ github.run_number }}"
          node -e "const f='./package.json',p=require(f);p.version='${DEV}';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          echo "Dev-Version: $DEV"

      - name: AppImage bauen (KEIN GitHub-Publish)
        run: npx electron-builder --linux --config electron-builder.companion.yml --publish never

      - name: Test-Artefakte aufs Backend laden (api-test)
        run: |
          for f in release-companion/companion-linux.yml release-companion/*.AppImage; do
            [ -e "$f" ] || continue
            echo "Upload $(basename "$f")"
            curl -fsS -H "Authorization: Bearer $BF_OVERLAY_UPLOAD_TOKEN" -F "file=@$f" "$API/overlay/upload"
          done
        env:
          API: https://api-test.blackfossil.de
          BF_OVERLAY_UPLOAD_TOKEN: ${{ secrets.BF_OVERLAY_UPLOAD_TOKEN_TEST }}

      - name: Versionierter Dateiname
        run: |
          V=$(node -p "require('./package.json').version")
          mv "release-companion/BlackFossil-Companion-Test-Setup.AppImage" "release-companion/BlackFossil-Companion-TEST-${V}-${GITHUB_SHA::7}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: companion-test-installer-linux
          path: app/release-companion/*.AppImage
          if-no-files-found: error
          retention-days: 14
