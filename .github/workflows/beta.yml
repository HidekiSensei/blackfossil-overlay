name: Build Test Installer (no publish)

on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows installer (NO publish)
        run: npx electron-builder --win --publish never

      - name: Versionierten Dateinamen setzen (gegen Verwechslung mit Public-Release)
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          mv "release/BlackFossil-Overlay-Setup.exe" "release/BlackFossil-Overlay-${V}.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackfossil-overlay-test-installer
          path: app/release/*.exe
          if-no-files-found: error
          retention-days: 14
