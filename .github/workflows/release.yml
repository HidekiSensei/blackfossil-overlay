# Public-Release des Overlays bei jedem Push/Merge auf main.
#
# Die Version wird aus app/package.json DES MERGES gelesen — der Mensch bumpt sie im
# Feature-/Release-PR, der Merge released dann genau diese Version.
# Veröffentlicht wird auf GitHub Releases: das IST der electron-updater-Feed
# (publish-Provider "github" in app/package.json) -> Auto-Update greift sofort für alle.
#
# Guard: Existiert der Tag zur Version schon (Version nicht gebumpt), wird sauber
# übersprungen statt zu scheitern — sonst würde jeder main-Push ohne Bump rot.
#
# Der Code/package.json hat Test-Defaults (api-test.blackfossil.de, appId/productName
# mit ".test"/"Test"-Suffix — siehe dev-build.yml). Vor dem Build patcht
# app/scripts/patch-prod.js beides auf die Produktiv-Werte — kein manuelles Ändern.
# Grund für die Test-Defaults im Repo: so bleibt ein lokal gebauter oder dev-Branch-
# Installer immer ein Test-Build (andere appId/productName/Installpfad) und kollidiert
# nie mit einer echten Produktiv-Installation — beide sind parallel installierbar.
# Zwei Plattformen, ein Release: Windows (nsis) und Linux (AppImage) laden in DASSELBE
# GitHub-Release. Die Feeds sind getrennt (latest.yml / latest-linux.yml), die Updater
# sehen einander nicht. Reihenfolge ist wichtig — siehe die Job-Kommentare unten.
name: Build & Release (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: overlay-release
  cancel-in-progress: false   # ein laufendes Release NIE abbrechen

jobs:
  # Windows-Build. Setzt ausserdem Version/Tag fest und legt den Tag an — die Folgejobs
  # uebernehmen beides ueber die Outputs, damit der Guard nur EINMAL ausgewertet wird.
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      exists: ${{ steps.v.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie + Tags für Changelog und Tag-Guard

      - name: Version + Tag aus dem Merge bestimmen
        id: v
        shell: bash
        run: |
          V=$(node -p "require('./app/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"    >> "$GITHUB_OUTPUT"
          if git rev-parse "v$V" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $V ist bereits released (Tag v$V existiert) -> kein neues Release. Fuer ein Release die Version in app/package.json bumpen."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release-Version: $V (Tag v$V)"
          fi

      # Guard: Version ist gebumpt, aber es fehlt der Release-Note-Abschnitt in CHANGELOG.md
      # -> HARTER Fehlschlag (kein Build/Upload). Version-nicht-gebumpt wird oben sauber übersprungen.
      - name: Release-Note vorhanden? (Guard)
        if: steps.v.outputs.exists == 'false'
        shell: bash
        run: node app/scripts/changelog-to-json.js --require "${{ steps.v.outputs.version }}"

      - name: Produktiv-Werte setzen (appId, productName, API-URL)
        if: steps.v.outputs.exists == 'false'
        run: node app/scripts/patch-prod.js

      - uses: actions/setup-node@v4
        if: steps.v.outputs.exists == 'false'
        with:
          node-version: 20

      - name: Tag setzen
        if: steps.v.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.v.outputs.tag }}" -m "BlackFossil Overlay ${{ steps.v.outputs.tag }}"
          git push origin "${{ steps.v.outputs.tag }}"

      - name: Dependencies
        if: steps.v.outputs.exists == 'false'
        working-directory: app
        run: npm ci

      - name: Renderer bauen
        if: steps.v.outputs.exists == 'false'
        working-directory: app
        run: npm run build:renderer

      - name: Installer bauen & auf GitHub Releases veröffentlichen
        if: steps.v.outputs.exists == 'false'
        working-directory: app
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bridge-Phase: parallel zum GitHub-Publish auch aufs eigene Backend laden (neuer Feed).
      # Sobald ein Client einmal einen Build mit setFeedURL(Backend) installiert hat, zieht er
      # künftig von hier. Nach der Migration wird "--publish always" (GitHub) entfernt.
      - name: Windows-Artefakte aufs Backend laden
        if: steps.v.outputs.exists == 'false'
        working-directory: app
        shell: bash
        run: |
          for f in release/latest.yml release/*.exe release/*.exe.blockmap; do
            [ -e "$f" ] || continue
            echo "Upload $(basename "$f")"
            curl -fsS -H "Authorization: Bearer $BF_OVERLAY_UPLOAD_TOKEN" -F "file=@$f" "$API/overlay/upload"
          done
        env:
          API: https://api.blackfossil.de
          BF_OVERLAY_UPLOAD_TOKEN: ${{ secrets.BF_OVERLAY_UPLOAD_TOKEN }}

  # Linux-AppImage ins SELBE Release. NACH dem Windows-Job, nicht parallel: sonst wuerden beide
  # gleichzeitig das Draft-Release anlegen wollen (Race), und den Tag setzt ohnehin nur "release".
  # AppImage und nicht deb/rpm/pacman — electron-updater 6.8.9 nimmt auf Linux per Default den
  # AppImageUpdater; die Paket-Updater brauchen root/pkexec zum Installieren (out/main.js:44-74),
  # was fuer ein vom Spieler gestartetes Overlay unbrauchbar ist.
  build-linux:
    needs: release
    if: needs.release.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dependencies
        working-directory: app
        run: npm ci

      - name: Renderer bauen
        working-directory: app
        run: npm run build:renderer

      - name: Produktiv-Werte setzen (appId, productName, API-URL)
        run: node app/scripts/patch-prod.js

      - name: AppImage bauen & auf GitHub Releases veröffentlichen
        working-directory: app
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Linux-Artefakte aufs Backend laden
        working-directory: app
        shell: bash
        run: |
          for f in release/latest-linux.yml release/*.AppImage; do
            [ -e "$f" ] || continue
            echo "Upload $(basename "$f")"
            curl -fsS -H "Authorization: Bearer $BF_OVERLAY_UPLOAD_TOKEN" -F "file=@$f" "$API/overlay/upload"
          done
        env:
          API: https://api.blackfossil.de
          BF_OVERLAY_UPLOAD_TOKEN: ${{ secrets.BF_OVERLAY_UPLOAD_TOKEN }}

  # Release erst live schalten, wenn BEIDE Artefakte oben liegen. Vorher stand dieser Schritt am
  # Ende des Windows-Jobs — damit waere das Release "latest" gewesen, waehrend die AppImage noch
  # fehlt, und der Linux-Updater liefe gegen eine 404 auf latest-linux.yml.
  publish:
    needs: [release, build-linux]
    if: needs.release.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie + Tags für den Changelog

      # Kuratierte Release-Notes aus CHANGELOG.md (kein Auto-Commit-Dump).
      - name: releases.json aus CHANGELOG + Notes bauen
        shell: bash
        run: |
          V="${{ needs.release.outputs.version }}"
          node app/scripts/changelog-to-json.js --notes "$V" > "${RUNNER_TEMP}/notes.md"
          node app/scripts/changelog-to-json.js --out "${RUNNER_TEMP}/releases.json"

      # Volle Notes-Historie aufs Backend (Software-Tab + später Discord-Bot).
      - name: releases.json aufs Backend laden
        shell: bash
        run: |
          curl -fsS -H "Authorization: Bearer $BF_OVERLAY_UPLOAD_TOKEN" -F "file=@${RUNNER_TEMP}/releases.json" "$API/overlay/upload"
        env:
          API: https://api.blackfossil.de
          BF_OVERLAY_UPLOAD_TOKEN: ${{ secrets.BF_OVERLAY_UPLOAD_TOKEN }}

      # GitHub-Release live schalten + als Latest markieren (Bridge-Phase: alte Clients ziehen von hier).
      # --latest ist entscheidend, sonst nimmt der GitHub-basierte Auto-Updater es nicht.
      - name: GitHub-Release veröffentlichen
        shell: bash
        run: |
          gh release edit "${{ needs.release.outputs.tag }}" \
            --draft=false \
            --latest \
            --title "BlackFossil Overlay ${{ needs.release.outputs.tag }}" \
            --notes-file "${RUNNER_TEMP}/notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
