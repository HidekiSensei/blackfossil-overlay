name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie + Tags für den Changelog

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build & publish Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Linux-AppImage ins SELBE Release. Läuft NACH dem Windows-Job, nicht parallel: beide Jobs würden
  # sonst gleichzeitig versuchen, das Draft-Release anzulegen (Race). AppImage, nicht deb/rpm/pacman —
  # electron-updater wählt auf Linux per Default den AppImageUpdater und braucht für die Paket-Updater
  # sonst root/pkexec beim Installieren (out/main.js). Der Feed heißt latest-linux.yml und ist von
  # latest.yml (Windows) getrennt → die Updater sehen einander nicht.
  build-linux:
    needs: build-windows
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build & publish Linux AppImage
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release erst live schalten, wenn BEIDE Artefakte oben liegen — sonst sieht der Auto-Updater der
  # einen Plattform ein Release, dessen Datei für die andere noch fehlt.
  publish-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie + Tags für den Changelog

      # Schöner Changelog aus den Commits seit dem letzten Tag, Release
      # veröffentlichen + als Latest markieren (wichtig für den Auto-Updater).
      - name: Generate changelog & publish release
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          {
            echo "## 📝 Änderungen"
            echo ""
            if [ -n "$PREV" ]; then
              git log --no-merges --pretty=format:'- %s' "${PREV}..${TAG}"
            else
              git log --no-merges --pretty=format:'- %s' "${TAG}"
            fi
            echo ""
            if [ -n "$PREV" ]; then
              echo ""
              echo "**Vollständiger Vergleich:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
          } > "${RUNNER_TEMP}/notes.md"
          gh release edit "${TAG}" \
            --draft=false \
            --latest \
            --title "BlackFossil Overlay ${TAG}" \
            --notes-file "${RUNNER_TEMP}/notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
