# Test-Build des Overlays bei jedem Push/Merge auf dev.
# Kein Publish, kein Auto-Update — nur ein Installer als Artifact zum Testen.
# Der Code/package.json hat Test-Defaults (api-test.blackfossil.de, appId
# "de.blackfossil.overlay.test", productName "BlackFossil Overlay Test") — main
# überschreibt das im release.yml via app/scripts/patch-prod.js vor dem Build.
# Kein manuelles Ändern beim Merge nötig.
# Die abweichende appId/productName ist Absicht: der Test-Installer landet dadurch in
# einem eigenen Installpfad/Registry-Eintrag und lässt sich parallel zur echten
# Produktiv-Installation installieren (Windows NSIS + Linux AppImage/Desktop-Eintrag).
name: Build Test-Installer (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: overlay-dev-build
  cancel-in-progress: true   # nur der neueste dev-Stand ist interessant

jobs:
  build-test-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build:renderer

      - name: Installer bauen (KEIN Publish)
        run: npx electron-builder --win --publish never

      - name: Versionierter Dateiname (gegen Verwechslung mit dem Public-Release)
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          mv "release/BlackFossil-Overlay-Test-Setup.exe" "release/BlackFossil-Overlay-TEST-${V}-${GITHUB_SHA::7}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: overlay-test-installer-win
          path: app/release/*.exe
          if-no-files-found: error
          retention-days: 14

  build-test-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build:renderer

      - name: Installer bauen (KEIN Publish)
        run: npx electron-builder --linux --publish never

      - name: Versionierter Dateiname (gegen Verwechslung mit dem Public-Release)
        run: |
          V=$(node -p "require('./package.json').version")
          mv "release/BlackFossil-Overlay-Test-Setup.AppImage" "release/BlackFossil-Overlay-TEST-${V}-${GITHUB_SHA::7}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: overlay-test-installer-linux
          path: app/release/*.AppImage
          if-no-files-found: error
          retention-days: 14