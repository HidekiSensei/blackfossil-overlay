# Test-Build des Overlays bei jedem Push/Merge auf dev.
# Kein Publish, kein Auto-Update — nur ein Installer als Artifact zum Testen.
# Zeigt automatisch auf api-test.blackfossil.de, weil der dev-Branch die Test-URL hält
# (tokenBase ist pro Branch hartkodiert: dev = api-test, main = Prod).
name: Build Test-Installer (dev)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: overlay-dev-build
  cancel-in-progress: true   # nur der neueste dev-Stand ist interessant

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build:renderer

      - name: Installer bauen (KEIN Publish)
        run: npx electron-builder --win --publish never

      - name: Kontrolle — dev muss auf api-test zeigen
        shell: bash
        run: |
          if grep -q "const TOKEN_BASE = 'https://api.blackfossil.de'" src/main.js; then
            echo "::error::dev-Build zeigt auf die PROD-API. tokenBase in src/main.js + src/renderer/overlay.js auf api-test setzen."
            exit 1
          fi
          echo "tokenBase ok: $(grep -m1 'const TOKEN_BASE' src/main.js)"

      - name: Versionierter Dateiname (gegen Verwechslung mit dem Public-Release)
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          mv "release/BlackFossil-Overlay-Setup.exe" "release/BlackFossil-Overlay-TEST-${V}-${GITHUB_SHA::7}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: overlay-test-installer
          path: app/release/*.exe
          if-no-files-found: error
          retention-days: 14
